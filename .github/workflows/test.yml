name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - 'hooks/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hooks/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Make hooks and mock executable
        run: |
          chmod +x hooks/*.sh
          chmod +x tests/helpers/say

      - name: Run unit tests
        run: npm test
